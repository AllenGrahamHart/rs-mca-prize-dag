<text x="358.6" y="574" text-anchor="middle" class="tick">&#8722;10&#8310;</text>
<line x1="507.8" y1="100" x2="507.8" y2="556" stroke="var(--grid)" stroke-width="1"/>
<text x="507.8" y="574" text-anchor="middle" class="tick">&#8722;10&#179;</text>
