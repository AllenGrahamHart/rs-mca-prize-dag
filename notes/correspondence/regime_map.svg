<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="660" viewBox="0 0 1060 660" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<style>
  :root { --surface:#fcfcfb; --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
          --grid:#e1e0d9; --axis:#c3c2b7;
          --s1:#2a78d6; --s2:#1baf7a; --s3:#eda100; }
  @media (prefers-color-scheme: dark) {
    :root { --surface:#1a1a19; --ink:#ffffff; --ink2:#c3c2b7; --muted:#898781;
            --grid:#2c2c2a; --axis:#383835;
            --s1:#3987e5; --s2:#199e70; --s3:#c98500; }
  }
  text { fill: var(--ink2); font-size: 12px; }
  .title { fill: var(--ink); font-size: 17px; font-weight: 650; }
  .sub   { fill: var(--ink2); font-size: 12.5px; }
  .tick  { fill: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; }
  .axlab { fill: var(--muted); font-size: 12px; }
  .lab   { font-size: 11.5px; }
  .lab1  { fill: var(--ink); font-weight: 600; }
  .lab2  { fill: var(--ink); font-weight: 600; }
  .lab3  { fill: var(--ink); font-weight: 600; }
  .leg   { fill: var(--ink2); font-size: 12px; }
</style>
<rect width="1060" height="660" fill="var(--surface)"/>
<text x="100" y="34" class="title">Regime map — both programs on the balance coordinate</text>
<text x="100" y="54" class="sub">&#916; = log&#8322;(#configurations) &#8722; log&#8322;(#values in the true value field), symlog</text>
<text x="100" y="70" class="sub">exact numbers in REGIME_MAP.md</text>
<circle cx="700" cy="26" r="5" fill="var(--s1)"/><text x="712" y="30" class="leg">upstream program</text>
<circle cx="700" cy="43" r="5" fill="var(--s2)"/><text x="712" y="47" class="leg">our floors' evidence</text>
<circle cx="700" cy="60" r="5" fill="var(--s3)"/><text x="712" y="64" class="leg">catch #11 (one row, two readings)</text>
