<text x="657.0" y="92" text-anchor="middle" class="axlab">BALANCE</text>
<text x="657.0" y="574" text-anchor="middle" class="tick">0</text>
<line x1="756.6" y1="100" x2="756.6" y2="556" stroke="var(--grid)" stroke-width="1"/>
<text x="756.6" y="574" text-anchor="middle" class="tick">+10&#178;</text>
<line x1="806.2" y1="100" x2="806.2" y2="556" stroke="var(--grid)" stroke-width="1"/>
<text x="806.2" y="574" text-anchor="middle" class="tick">+10&#179;</text>
<line x1="955.3" y1="100" x2="955.3" y2="556" stroke="var(--grid)" stroke-width="1"/>
<text x="955.3" y="574" text-anchor="middle" class="tick">+10&#8310;</text>
<text x="557.5" y="598" text-anchor="middle" class="axlab">&#916; bits above balance &#8594; collisions forced (window populations live to the right)</text>
<line x1="100" y1="533.8" x2="1015" y2="533.8" stroke="var(--grid)" stroke-width="1"/>
<text x="92" y="537.8" text-anchor="end" class="tick">n = 32</text>
<line x1="100" y1="511.5" x2="1015" y2="511.5" stroke="var(--grid)" stroke-width="1"/>
<text x="92" y="515.5" text-anchor="end" class="tick">n = 128</text>
<line x1="100" y1="355.8" x2="1015" y2="355.8" stroke="var(--grid)" stroke-width="1"/>
<text x="92" y="359.8" text-anchor="end" class="tick">n = 2&#178;&#185;</text>
<line x1="100" y1="133.4" x2="1015" y2="133.4" stroke="var(--grid)" stroke-width="1"/>
<text x="92" y="137.4" text-anchor="end" class="tick">n = 2&#8308;&#185;</text>
<text x="30" y="328.0" transform="rotate(-90 30 328.0)" text-anchor="middle" class="axlab">row size (log&#8322; n)</text>
<rect x="597.8" y="504.8" width="99.9" height="35.6" fill="var(--s2)" opacity="0.16" rx="4"/>
<text x="589.8" y="518.6" text-anchor="end" class="lab lab2">F2 sub-balance censuses (n = 32&#8211;128)</text>
<text x="589.8" y="533.6" text-anchor="end" class="lab">extras = 0 throughout</text>
<circle cx="546.9" cy="355.8" r="5.5" fill="var(--s3)"/>
