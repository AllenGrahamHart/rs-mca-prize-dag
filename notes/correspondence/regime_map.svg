<circle cx="664.5" cy="533.8" r="7.5" fill="var(--surface)"/>
<circle cx="664.5" cy="533.8" r="5.5" fill="var(--s2)"/>
<text x="654.5" y="553.8" text-anchor="end" class="lab lab2">p=21313 window relatives (+0.4)</text>
<circle cx="657.0" cy="522.6" r="7.5" fill="var(--surface)"/>
<circle cx="657.0" cy="522.6" r="5.5" fill="var(--s2)"/>
