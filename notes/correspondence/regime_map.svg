<circle cx="971.2" cy="355.8" r="5.5" fill="var(--s1)"/>
<text x="969.2" y="323.8" text-anchor="end" class="lab lab1">proved head-depth theorems (w &#8804; 21 / 10)</text>
<text x="969.2" y="337.8" text-anchor="end" class="lab">&#916; &#8776; +2.09M bits</text>
<circle cx="967.3" cy="355.8" r="7.5" fill="var(--surface)"/>
<circle cx="967.3" cy="355.8" r="5.5" fill="var(--s3)"/>
<defs><marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="var(--s3)"/></marker></defs>
<line x1="546.9" y1="417.8" x2="967.3" y2="417.8" stroke="var(--s3)" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arr)"/>
<line x1="546.9" y1="363.8" x2="546.9" y2="417.8" stroke="var(--s3)" stroke-width="1" stroke-dasharray="2 4"/>
<line x1="967.3" y1="363.8" x2="967.3" y2="417.8" stroke="var(--s3)" stroke-width="1" stroke-dasharray="2 4"/>
<text x="757.1" y="435.8" text-anchor="middle" class="lab lab3">the &#946;-jump (catch #11): the same row read at the true p-scale lands at +1.74M bits</text>
<text x="757.1" y="450.8" text-anchor="middle" class="lab">t-null values never leave the base field &#8212; the window must be read at the generated field</text>
