<text x="546.9" y="337.8" text-anchor="middle" class="lab">window &#8220;admits&#8221; (&#8722;162 bits)</text>
<circle cx="748.1" cy="355.8" r="7.5" fill="var(--surface)"/>
<circle cx="748.1" cy="355.8" r="5.5" fill="var(--s1)"/>
<circle cx="742.7" cy="355.8" r="7.5" fill="var(--surface)"/>
<circle cx="742.7" cy="355.8" r="5.5" fill="var(--s1)"/>
<circle cx="734.9" cy="355.8" r="7.5" fill="var(--surface)"/>
<circle cx="734.9" cy="355.8" r="5.5" fill="var(--s1)"/>
