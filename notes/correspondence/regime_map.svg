<circle cx="127.7" cy="133.4" r="5.5" fill="var(--s2)"/>
<text x="139.7" y="127.4" class="lab lab2">official prize-max F2 window (generating rows)</text>
<text x="139.7" y="142.4" class="lab">sub-balance by 2% of n = 4.4&#183;10&#185;&#8304; bits of slack</text>
